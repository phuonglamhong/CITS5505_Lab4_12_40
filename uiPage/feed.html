<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrandPulse — Media Feed</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>

  <!-- ── Sidebar ── -->
  <nav class="sidebar">
    <div class="sidebar-brand">Brand<span>Pulse</span></div>
    <ul class="sidebar-nav">
      <li><a href="dashboard.html"><i class="fa fa-chart-pie"></i> Dashboard</a></li>
      <li><a href="feed.html" class="active"><i class="fa fa-newspaper"></i> Media Feed</a></li>
      <li><a href="competitor.html"><i class="fa fa-chart-bar"></i> Competitor</a></li>
    </ul>
    <div class="sidebar-footer">
      <i class="fa fa-user-circle me-1"></i> Alex Chen &nbsp;·&nbsp;
      <a href="login.html" style="color:rgba(255,255,255,0.5);">Sign out</a>
    </div>
  </nav>

  <!-- ── Main ── -->
  <div class="main-wrapper">
    <div class="topbar">
      <span class="topbar-title">Media Feed</span>
      <div class="topbar-right">
        <span><i class="fa fa-bell text-warning me-1"></i> 3 alerts</span>
        <span>2,841 articles</span>
      </div>
    </div>

    <div class="page-content">

      <!-- Summary counts -->
      <div class="row g-2 mb-3">
        <div class="col-6 col-md-3">
          <div class="stat-card text-center py-2">
            <div class="stat-value" style="font-size:1.3rem;">10</div>
            <div class="stat-label">Total</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="stat-card text-center py-2">
            <div class="stat-value" style="font-size:1.3rem;color:var(--positive);">6</div>
            <div class="stat-label">Positive</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="stat-card text-center py-2">
            <div class="stat-value" style="font-size:1.3rem;color:var(--neutral);">2</div>
            <div class="stat-label">Neutral</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="stat-card text-center py-2">
            <div class="stat-value" style="font-size:1.3rem;color:var(--negative);">3</div>
            <div class="stat-label">Negative</div>
          </div>
        </div>
      </div>

      <!-- Filter Bar -->
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all" onclick="filterArticles(this,'all')">All</button>
        <button class="filter-btn" data-filter="positive" onclick="filterArticles(this,'positive')">Positive</button>
        <button class="filter-btn" data-filter="neutral" onclick="filterArticles(this,'neutral')">Neutral</button>
        <button class="filter-btn" data-filter="negative" onclick="filterArticles(this,'negative')">Negative</button>

        <div class="ms-auto d-flex gap-2 align-items-center">
          <select class="form-select form-select-sm" id="source-filter" style="width:130px;" onchange="applySourceFilter()">
            <option value="">All Sources</option>
            <option value="Reuters">Reuters</option>
            <option value="Financial Times">Financial Times</option>
            <option value="Bloomberg">Bloomberg</option>
            <option value="The Verge">The Verge</option>
            <option value="TechCrunch">TechCrunch</option>
            <option value="BBC">BBC</option>
          </select>
          <input type="text" class="form-control form-control-sm" id="search-input"
                 placeholder="Search articles…" style="width:180px;" oninput="applySearch()">
        </div>
      </div>

      <!-- Article List -->
      <div id="article-list">
        <!-- Populated by feed.js -->
      </div>

      <!-- No results message -->
      <div id="no-results" class="text-center text-muted py-5 d-none">
        <i class="fa fa-search fa-2x mb-2"></i>
        <p>No articles match your filters.</p>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../static/js/feed.js"></script>
</body>
</html>
