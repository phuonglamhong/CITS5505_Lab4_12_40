<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NewsSentiment — Sign In</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../static/css/style.css" />
  </head>
  <body class="login-page">
    <div class="login-card">
      <div class="login-logo">News<span>Sentiment</span></div>
      <p class="login-subtitle">News sentiment intelligence platform</p>

      <!-- Tab toggle -->
      <ul class="nav nav-tabs mb-4" id="authTab" role="tablist">
        <li class="nav-item" role="presentation">
          <button
            class="nav-link active"
            id="signin-tab"
            data-bs-toggle="tab"
            data-bs-target="#signin"
            type="button"
            role="tab"
          >
            Sign In
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button
            class="nav-link"
            id="register-tab"
            data-bs-toggle="tab"
            data-bs-target="#register"
            type="button"
            role="tab"
          >
            Register
          </button>
        </li>
      </ul>

      <div class="tab-content" id="authTabContent">
        <!-- Sign In -->
        <div class="tab-pane fade show active" id="signin" role="tabpanel">
          <div
            id="login-error"
            class="alert alert-danger d-none"
            role="alert"
          ></div>
          <form id="login-form" novalidate>
            <div class="mb-3">
              <label for="login-email" class="form-label">Email address</label>
              <input
                type="email"
                class="form-control"
                id="login-email"
                placeholder="you@example.com"
                required
              />
            </div>
            <div class="mb-3">
              <label for="login-password" class="form-label">Password</label>
              <input
                type="password"
                class="form-control"
                id="login-password"
                placeholder="Enter password"
                required
              />
            </div>
            <div class="d-flex justify-content-between align-items-center mb-3">
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="rememberMe"
                />
                <label
                  class="form-check-label text-muted"
                  for="rememberMe"
                  style="font-size: 0.85rem"
                >
                  Remember me
                </label>
              </div>
              <a href="#" style="font-size: 0.85rem">Forgot password?</a>
            </div>
            <button type="submit" class="btn btn-primary w-100">Sign In</button>
          </form>
        </div>

        <!-- Register -->
        <div class="tab-pane fade" id="register" role="tabpanel">
          <div
            id="register-error"
            class="alert alert-danger d-none"
            role="alert"
          ></div>
          <div
            id="register-success"
            class="alert alert-success d-none"
            role="alert"
          ></div>
          <form id="register-form" novalidate>
            <div class="mb-3">
              <label for="reg-name" class="form-label">Full Name</label>
              <input
                type="text"
                class="form-control"
                id="reg-name"
                placeholder="Alex Chen"
                required
              />
            </div>
            <div class="mb-3">
              <label for="reg-email" class="form-label">Email address</label>
              <input
                type="email"
                class="form-control"
                id="reg-email"
                placeholder="you@example.com"
                required
              />
            </div>
            <div class="mb-3">
              <label for="reg-role" class="form-label">Role</label>
              <select class="form-select" id="reg-role">
                <option value="analyst">Analyst</option>
                <option value="manager">Manager</option>
                <option value="viewer">Viewer</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="reg-password" class="form-label">Password</label>
              <input
                type="password"
                class="form-control"
                id="reg-password"
                placeholder="Min. 8 characters"
                required
                minlength="8"
              />
              <div class="form-text">Must be at least 8 characters.</div>
            </div>
            <div class="mb-3">
              <label for="reg-confirm" class="form-label"
                >Confirm Password</label
              >
              <input
                type="password"
                class="form-control"
                id="reg-confirm"
                placeholder="Repeat password"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary w-100">
              Create Account
            </button>
          </form>
        </div>
      </div>
      <!-- /tab-content -->
    </div>
    <!-- /login-card -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // ── Login form validation ──
      document
        .getElementById("login-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const email = document.getElementById("login-email").value.trim();
          const password = document
            .getElementById("login-password")
            .value.trim();
          const errBox = document.getElementById("login-error");

          if (!email || !password) {
            errBox.textContent = "Please fill in all fields.";
            errBox.classList.remove("d-none");
            return;
          }
          // Checkpoint 3: replace with real fetch() POST to /login
          errBox.classList.add("d-none");
          alert("Login submitted! (Backend not yet connected — Checkpoint 3)");
        });

      // ── Register form validation ──
      document
        .getElementById("register-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const name = document.getElementById("reg-name").value.trim();
          const email = document.getElementById("reg-email").value.trim();
          const password = document.getElementById("reg-password").value;
          const confirm = document.getElementById("reg-confirm").value;
          const errBox = document.getElementById("register-error");
          const okBox = document.getElementById("register-success");

          errBox.classList.add("d-none");
          okBox.classList.add("d-none");

          if (!name || !email || !password) {
            errBox.textContent = "Please fill in all fields.";
            errBox.classList.remove("d-none");
            return;
          }
          if (password.length < 8) {
            errBox.textContent = "Password must be at least 8 characters.";
            errBox.classList.remove("d-none");
            return;
          }
          if (password !== confirm) {
            errBox.textContent = "Passwords do not match.";
            errBox.classList.remove("d-none");
            return;
          }
          // Checkpoint 3: replace with real fetch() POST to /register
          okBox.textContent = "Account created! Redirecting…";
          okBox.classList.remove("d-none");
        });
    </script>
  </body>
</html>
