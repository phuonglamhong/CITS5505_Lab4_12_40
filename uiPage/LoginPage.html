<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — News Sentiment Analyzer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="min-h-screen m-0 font-sans bg-gradient-to-br from-blue-100 via-gray-100 to-white text-gray-900">
    <div class="min-h-screen flex items-center justify-center p-6">
      <section class="w-full max-w-md p-8 pb-7 rounded-xl bg-white shadow-xl border border-gray-200/9" aria-label="Sign in to News Sentiment Analyzer">
        <h1 class="m-0 mb-2.5 text-1.75rem">Sign in</h1>
        <p class="m-0 mb-6.5 text-gray-500 leading-relaxed">Access your News Sentiment analysis dashboard, upload files, and share insights with your team.</p>

        <div class="flex flex-col gap-2 mb-4.5">
          <label for="user" class="font-semibold text-sm">User</label>
          <select id="user" class="p-3 rounded-xl border border-gray-300/8 text-base outline-none transition-all duration-200 focus:border-blue-500/8 focus:ring-2 focus:ring-blue-500/15">
            <option value="alice">alice</option>
            <option value="bob">bob</option>
            <option value="carol">carol</option>
            <option value="admin">admin</option>
          </select>
          <p class="hint text-sm text-gray-500">Select a user to sign in as (demo only).</p>
        </div>

        <div class="flex flex-col gap-2 mb-4.5">
          <label for="password" class="font-semibold text-sm">Password</label>
          <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required class="p-3 rounded-xl border border-gray-300/8 text-base outline-none transition-all duration-200 focus:border-blue-500/8 focus:ring-2 focus:ring-blue-500/15">
        </div>

        <div class="flex gap-3 items-center justify-between">
          <button class="secondary px-4 py-3 rounded-full border border-gray-300/9 bg-white/7 text-gray-800 font-bold cursor-pointer transition-all duration-150 hover:bg-white/95" id="backBtn" type="button">Back</button>
          <button class="primary px-4 py-3 rounded-full border-none bg-blue-700 text-white font-bold cursor-pointer shadow-lg shadow-blue-700/18 transition-all duration-150 hover:-translate-y-0.5 hover:shadow-xl hover:shadow-blue-700/2" id="signInBtn" type="button">Sign in</button>
        </div>

        <p class="helper mt-4.5 text-sm text-gray-500">
          Don't have an account? <a href="#" id="createAccount" class="text-blue-700 no-underline font-semibold">Create one</a> (demo only).
        </p>

        <div class="status mt-5.5 p-3.5 rounded-xl border border-gray-300/8 bg-gray-200/55 text-sm hidden" id="formStatus">
          <span id="formStatusText" class="font-semibold">Checking your credentials…</span>
        </div>
      </section>
    </div>

    <script>
      const formStatus = document.getElementById('formStatus');
      const formStatusText = document.getElementById('formStatusText');
      const userSelect = document.getElementById('user');
      const passwordInput = document.getElementById('password');

      const showStatus = (message) => {
        formStatus.hidden = false;
        formStatusText.textContent = message;
      };

      const simulateDelay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      const redirectHome = () => {
        window.location.href = 'HomePage.html';
      };

      document.getElementById('backBtn').addEventListener('click', () => {
        window.location.href = 'HomePage.html';
      });

      document.getElementById('signInBtn').addEventListener('click', async () => {
        const user = userSelect.value;
        const password = passwordInput.value.trim();

        if (!user || !password) {
          showStatus('Please select a user and enter a password.');
          return;
        }

        showStatus('Validating credentials...');
        await simulateDelay(1000);

        if (password.length >= 4) {
          localStorage.setItem('sentiment-current-user', user);
          showStatus('Login successful! Redirecting…');
          await simulateDelay(700);
          redirectHome();
        } else {
          showStatus('Password must be at least 4 characters. Please try again.');
        }
      });

      document.getElementById('createAccount').addEventListener('click', async (event) => {
        event.preventDefault();
        showStatus('Creating your account...');
        await simulateDelay(900);
        showStatus('Account created! Please sign in to continue.');
      });
    </script>
  </body>
</html>
