<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Feed & Discussion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Collapsible content animation */
    .collapsible-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }
    .expanded {
      max-height: 1000px;
      transition: max-height 0.5s ease-in;
    }
  </style>
</head>
<body class="min-h-screen m-0 font-sans bg-gradient-to-br from-blue-100 via-gray-100 to-white text-gray-900">
  
  <!-- Header Section -->
  <header class="px-8 py-6 flex items-center justify-between bg-white/80 backdrop-blur-sm shadow-sm sticky top-0 z-10">
    <a href="index.html" class="flex items-center gap-3.5 text-xl font-bold text-blue-700 no-underline">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" aria-hidden="true">
        <rect width="64" height="64" rx="16" fill="#1D4ED8" />
        <path d="M44 20L28 32L20 28" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M44 32L28 44L20 40" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      News Sentiment Analyzer
    </a>
    <div class="flex gap-3.5">
      <span class="text-sm text-gray-500 self-center">Welcome, User</span>
      <button type="button" class="border border-transparent rounded-full px-4 py-2.5 font-semibold cursor-pointer bg-white/65 hover:bg-white/90 hover:border-gray-200/90 transition-all duration-200">Log out</button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex flex-col gap-6 max-w-3xl mx-auto px-6 py-10">
    <!-- Page Title -->
    <div class="text-center mb-4">
      <h1 class="text-3xl font-bold text-gray-800 mb-2">Latest News Feed</h1>
      <p class="text-gray-500">Swipe through analyzed news and join the discussion.</p>
    </div>

    <!-- News Feed Container (populated by JS) -->
    <div id="newsFeedContainer" class="space-y-6"></div>
  </main>

  <script>
    // Mock data: Analyzed news items (from API in production)
    const newsData = [
      {
        id: 1,
        title: "Tech Giant Reports Record Quarterly Earnings Amid AI Boom",
        content: "In a stunning financial disclosure, the tech leader announced a 40% surge in revenue, driven primarily by its cloud computing and artificial intelligence divisions. Market analysts have upgraded the stock outlook.",
        sentiment: "positive",
        comments: [
          { user: "StockWatcher", text: "Called it! This is just the beginning.", time: "10 min ago" },
          { user: "EconomicsNerd", text: "Let's see if this translates to the broader market." , time: "5 min ago"}
        ]
      },
      {
        id: 2,
        title: "Local Council Votes on New Infrastructure Bill Next Week",
        content: "The city council is set to convene next Monday to discuss the proposed $500M infrastructure bill. The bill includes provisions for public transport, green spaces, and affordable housing. Opinions remain divided among council members.",
        sentiment: "neutral",
        comments: [
          { user: "LocalResident", text: "We really need better public transport.", time: "2 hours ago" }
        ]
      },
      {
        id: 3,
        title: "Unexpected Weather Front Causes Major Disruptions in Coastal Regions",
        content: "A severe storm system has made landfall unexpectedly, leading to widespread power outages and transportation chaos. Emergency services are advising residents to stay indoors and avoid unnecessary travel.",
        sentiment: "negative",
        comments: []
      }
    ];

    // Get sentiment-based styling classes
    function getSentimentStyle(sentiment) {
      switch(sentiment) {
        case 'positive': return 'bg-green-100 text-green-700 border-green-200';
        case 'negative': return 'bg-red-100 text-red-700 border-red-200';
        default: return 'bg-gray-100 text-gray-700 border-gray-200';
      }
    }

    // Get formatted sentiment label
    function getSentimentLabel(sentiment) {
      switch(sentiment) {
        case 'positive': return 'Positive';
        case 'negative': return 'Negative';
        default: return 'Neutral';
      }
    }

    // Render news feed to DOM
    const container = document.getElementById('newsFeedContainer');

    function renderNewsFeed() {
      container.innerHTML = newsData.map(news => `
        <article class="p-6 rounded-xl bg-white shadow-lg border border-gray-200 flex flex-col gap-4" id="news-card-${news.id}">
          <!-- News header: Title + sentiment badge -->
          <div class="flex justify-between items-start gap-4">
            <h2 class="text-xl font-bold text-gray-800 leading-snug flex-grow">${news.title}</h2>
            <span class="px-3 py-1 rounded-full text-xs font-bold border shrink-0 ${getSentimentStyle(news.sentiment)}">
              ${getSentimentLabel(news.sentiment)}
            </span>
          </div>

          <!-- Expandable news content -->
          <div>
            <button onclick="toggleContent(${news.id})" class="text-blue-600 text-sm font-semibold hover:text-blue-800 mb-2 flex items-center gap-1">
              <span id="content-toggle-text-${news.id}">Read more</span>
              <svg id="content-toggle-icon-${news.id}" class="w-4 h-4 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </button>
            <div id="content-${news.id}" class="collapsible-content text-gray-600 leading-relaxed">
              <p>${news.content}</p>
            </div>
          </div>

          <hr class="border-gray-100">

          <!-- Action bar: Comment count -->
          <div class="flex justify-between items-center">
            <button onclick="toggleComments(${news.id})" class="flex items-center gap-2 text-gray-500 hover:text-blue-600 font-medium transition-colors group">
              <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
              <span id="comment-count-${news.id}">${news.comments.length} Comments</span>
            </button>
          </div>

          <!-- Expandable comments section -->
          <div id="comments-section-${news.id}" class="collapsible-content pt-2">
            <div class="bg-gray-50 rounded-lg p-4 space-y-4 mt-2">
              <!-- Comments list -->
              <div id="comment-list-${news.id}" class="space-y-3">
                ${news.comments.length === 0 
                  ? '<p class="text-gray-400 text-sm text-center py-2">No comments yet. Be the first!</p>' 
                  : news.comments.map(c => `
                    <div class="flex gap-3">
                      <div class="w-8 h-8 rounded-full bg-blue-200 flex items-center justify-center text-blue-800 text-xs font-bold shrink-0">${c.user.charAt(0)}</div>
                      <div class="bg-white p-3 rounded-lg shadow-sm border border-gray-100 flex-grow">
                        <div class="flex justify-between items-baseline mb-1">
                          <span class="font-bold text-sm text-gray-800">${c.user}</span>
                          <span class="text-xs text-gray-400">${c.time}</span>
                        </div>
                        <p class="text-sm text-gray-600">${c.text}</p>
                      </div>
                    </div>
                  `).join('')
                }
              </div>

              <!-- Comment input form -->
              <div class="flex gap-3 pt-2 border-t border-gray-200">
                <div class="w-8 h-8 rounded-full bg-gray-300 flex items-center justify-center text-gray-600 text-xs font-bold shrink-0">U</div>
                <div class="flex-grow flex gap-2">
                  <input type="text" id="input-${news.id}" placeholder="Write a comment..." class="flex-grow border border-gray-300 rounded-full px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                  <button onclick="postComment(${news.id})" class="bg-blue-600 text-white px-4 py-2 rounded-full text-sm font-semibold hover:bg-blue-700 transition-colors">Post</button>
                </div>
              </div>
            </div>
          </div>
        </article>
      `).join('');
    }

    // Toggle news content expansion/collapse
    window.toggleContent = function(newsId) {
      const content = document.getElementById(`content-${newsId}`);
      const text = document.getElementById(`content-toggle-text-${newsId}`);
      const icon = document.getElementById(`content-toggle-icon-${newsId}`);

      if (content.classList.contains('expanded')) {
        content.classList.remove('expanded');
        text.textContent = 'Read more';
        icon.style.transform = 'rotate(0deg)';
      } else {
        content.classList.add('expanded');
        text.textContent = 'Show less';
        icon.style.transform = 'rotate(180deg)';
      }
    }

    // Toggle comments section visibility
    window.toggleComments = function(newsId) {
      const section = document.getElementById(`comments-section-${newsId}`);
      section.classList.toggle('expanded');
    }

    // Post new comment to news item
    window.postComment = function(newsId) {
      const input = document.getElementById(`input-${newsId}`);
      const text = input.value.trim();
      
      if (!text) return;

      // Find target news item
      const newsItem = newsData.find(n => n.id === newsId);
      
      // Create new comment object
      const newComment = {
        user: "You",
        text: text,
        time: "Just now"
      };
      newsItem.comments.push(newComment);

      // Re-render feed with new comment
      renderNewsFeed();

      // Re-open comments section and scroll to it
      const section = document.getElementById(`comments-section-${newsId}`);
      section.classList.add('expanded');
      document.getElementById(`news-card-${newsId}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // Initialize news feed on page load
    renderNewsFeed();
  </script>
</body>
</html>
